services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: calls
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./infra/postgres/migrations/002_telegram_chat_ids.sql:/docker-entrypoint-initdb.d/002-telegram-chat-ids.sql:ro
      - ./infra/postgres/migrations/003_outbox.sql:/docker-entrypoint-initdb.d/003-outbox.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d calls"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      kafka:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./scripts/create_topics.sh:/create_topics.sh:ro
    entrypoint: ["/bin/sh", "/create_topics.sh"]
    restart: "no"

  api:
    build: .
    command: python -m app.services.api
    restart: unless-stopped
    env_file: .env
    ports: ["8080:8080"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  mango-worker:
    build: .
    command: python -m app.services.mango_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck: &worker-health
      test: ["CMD", "python", "-c", "from pathlib import Path; assert b'app.services' in Path('/proc/1/cmdline').read_bytes()"]
      interval: 15s
      timeout: 5s
      retries: 3

  transcriber-worker:
    build: .
    command: python -m app.services.transcriber_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck: *worker-health

  quality-worker:
    build: .
    command: python -m app.services.quality_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck: *worker-health

  telegram-worker:
    build: .
    command: python -m app.services.telegram_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck: *worker-health

volumes:
  postgres_data:
  minio_data:
