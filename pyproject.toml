[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
pythonpath = ["."]
addopts = "--cov=app --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.report]
exclude_also = [
    "if __name__ == .__main__.:",
    "async def run\\(\\) -> None:",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]
